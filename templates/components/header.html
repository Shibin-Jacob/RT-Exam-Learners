<header class="header">

    <div class="header-left">
        <h2>Exam Simulator</h2>
        <span class="progress">Q {{ qn+1 }} / {{ total }}</span>
    </div>

    <div class="header-center">
        <span class="username">{{ name }}</span>
    </div>

    <div class="header-right">
        <div class="timer-box">
            <span id="timer">00:30</span>
        </div>
    </div>

</header>
